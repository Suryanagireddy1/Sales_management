{% extends "layout.html" %}
{% block content %}

<h3>Add / Update Customer</h3><form method="POST"><div class="mb-3">
<label class="form-label">Customer ID (optional)</label>
<input type="number" name="customer_id" class="form-control">
<small class="text-muted">
Enter ID if you want to replace/update existing customer
</small>
</div><div class="mb-3">
<label class="form-label">Customer Name</label>
<input type="text" name="name" class="form-control" required>
</div><div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" name="phone" class="form-control">
</div><button type="submit" class="btn btn-success">
Save Customer
</button><a href="/add_bill" class="btn btn-secondary">
Back
</a></form>{% endblock %}
