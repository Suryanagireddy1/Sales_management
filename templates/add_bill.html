<!-- Existing Customer -->
<div class="mb-3">
    <label class="form-label fw-semibold">Select Existing Customer</label>

    <select name="customer" class="form-select">
        <option value="">-- Select Customer --</option>

        {% for customer in customers %}
        <option value="{{ customer.id }}">
            {{ customer.name }} (ID: {{ customer.id }})
        </option>
        {% endfor %}
    </select>

    <small class="text-muted">
        If customer is not listed, enter new customer below.
    </small>
</div>


<!-- New Customer -->
<div class="mb-3">
    <label class="form-label fw-semibold">New Customer Name</label>
    <input type="text" name="new_customer_name" class="form-control"
           placeholder="Enter new customer name">
</div>

<div class="mb-3">
    <label class="form-label fw-semibold">Stall ID / Customer ID</label>
    <input type="text" name="new_customer_id" class="form-control"
           placeholder="Enter stall or customer ID">
</div>
